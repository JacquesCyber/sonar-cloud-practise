# =============================================================================
# SonarCloud Project Configuration
# =============================================================================
# This file controls how SonarCloud analyzes your project.
# Place this file at the ROOT of your repository.
#
# Full property reference: https://docs.sonarsource.com/sonarcloud/advanced-setup/analysis-parameters/
# =============================================================================

# -----------------------------------------------------------------------------
# REQUIRED: Project Identification
# -----------------------------------------------------------------------------

# sonar.projectKey: Unique identifier for this project within your organization.
# Format: <organization-key>_<project-name>
# Find/set this when you create the project in SonarCloud UI.
# WARNING: Changing this creates a new project in SonarCloud — old history is lost.
sonar.projectKey=jacquescyber_sonarcloud-devsecops-template

# sonar.organization: Your SonarCloud organization key.
# Find it at: sonarcloud.io > your org > Administration > Organization Key
# This is NOT your GitHub username — it's the SonarCloud org identifier.
sonar.organization=jacquescyber

# sonar.projectName: Human-readable display name shown in the SonarCloud UI.
# Safe to change at any time without losing history.
sonar.projectName=SonarCloud DevSecOps Template

# sonar.projectVersion: Version tag shown in SonarCloud dashboards.
# Useful for tracking when issues were introduced relative to releases.
# Can be set dynamically in CI: -Dsonar.projectVersion=${{ github.ref_name }}
sonar.projectVersion=1.0

# -----------------------------------------------------------------------------
# Source and Test Configuration
# -----------------------------------------------------------------------------

# sonar.sources: Comma-separated list of directories containing production source code.
# Relative to the project root. SonarCloud analyzes these for all issue types.
# Default: . (entire repository root)
# Best practice: Point this at ONLY your source directories, not build artifacts.
sonar.sources=src/vulnerable,src/fixed

# sonar.tests: Comma-separated list of directories containing test code.
# Test code is analyzed differently — some rules don't apply to tests.
# Test code is also excluded from coverage requirements by default.
# sonar.tests=tests,src/__tests__

# sonar.sourceEncoding: Character encoding of source files.
# UTF-8 is standard. Change only if your codebase uses a legacy encoding.
sonar.sourceEncoding=UTF-8

# -----------------------------------------------------------------------------
# Language-Specific Coverage Reports
# -----------------------------------------------------------------------------
# SonarCloud does NOT run your tests — it reads coverage reports YOU generate.
# Your CI pipeline must: (1) run tests with coverage, (2) upload the report path here.

# sonar.python.coverage.reportPaths: Path to Python coverage XML report.
# Generate with: pytest --cov=src --cov-report=xml:coverage.xml
# Or: coverage run -m pytest && coverage xml
sonar.python.coverage.reportPaths=coverage.xml

# sonar.javascript.lcov.reportPaths: Path to JavaScript/TypeScript LCOV coverage report.
# Generate with: jest --coverage (outputs to coverage/lcov.info by default)
# Or with NYC: nyc --reporter=lcov mocha
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# sonar.typescript.lcov.reportPaths: Same as above but for TypeScript projects.
# Often the same file as the JavaScript path if using a unified test runner.
# sonar.typescript.lcov.reportPaths=coverage/lcov.info

# sonar.java.binaries: REQUIRED for Java projects — path to compiled .class files.
# Java analysis requires compiled bytecode, not just source.
# sonar.java.binaries=target/classes

# sonar.java.libraries: Path to JAR dependencies for Java projects.
# sonar.java.libraries=target/dependency/*.jar

# -----------------------------------------------------------------------------
# File Exclusions
# -----------------------------------------------------------------------------
# Exclusions prevent SonarCloud from analyzing certain files.
# Use these carefully — excluding too much defeats the purpose of SAST.
#
# Common legitimate exclusions:
# - Third-party libraries you don't control
# - Auto-generated code (migrations, protobuf output, etc.)
# - Build artifacts
#
# BAD PRACTICE: Excluding files just because they have issues.
# This masks real problems. Fix the issues or acknowledge them in SonarCloud.

# sonar.exclusions: Files excluded from ALL analysis (not counted at all).
# Supports Ant-style patterns: ** matches any path, * matches within a directory.
sonar.exclusions=\
  **/node_modules/**,\
  **/.venv/**,\
  **/venv/**,\
  **/__pycache__/**,\
  **/dist/**,\
  **/build/**,\
  **/*.min.js,\
  **/migrations/**,\
  **/*.pb.go,\
  **/*_generated.py

# sonar.coverage.exclusions: Files excluded from COVERAGE calculations only.
# These files are still analyzed for bugs/vulnerabilities, just not coverage-tracked.
# Good candidates: configuration files, CLI entrypoints, generated code.
sonar.coverage.exclusions=\
  **/tests/**,\
  **/*_test.py,\
  **/*.test.js,\
  **/*.spec.js,\
  **/conftest.py,\
  **/__init__.py

# sonar.cpd.exclusions: Files excluded from DUPLICATION detection only.
# Use for files where duplication is expected (e.g., fixture data, generated code).
# sonar.cpd.exclusions=**/fixtures/**,**/test_data/**

# sonar.test.exclusions: Paths that should NOT be treated as test code even if
# they match patterns in sonar.tests. Rarely needed.
# sonar.test.exclusions=src/test/integration/**

# -----------------------------------------------------------------------------
# Branch Analysis Configuration
# -----------------------------------------------------------------------------
# Branch analysis allows SonarCloud to analyze feature branches and compare
# them against the main branch. This enables PR decoration.
#
# NOTE: In GitHub Actions, branch info is passed automatically via the
# sonarcloud-github-action. These properties are for manual scanner invocations.

# sonar.branch.name: The name of the branch being analyzed.
# Usually set automatically by the scanner from CI environment variables.
# sonar.branch.name=feature/my-feature

# sonar.branch.target: The target branch this branch will merge into.
# Used to determine the "new code" period for Quality Gate evaluation.
# sonar.branch.target=main

# -----------------------------------------------------------------------------
# New Code Definition
# -----------------------------------------------------------------------------
# "New code" is the code added/modified since a reference point.
# Quality Gates primarily evaluate NEW code, not all historical code.
# This makes Quality Gates actionable — you fix new issues, not all legacy issues.
#
# Options (set in SonarCloud UI, not this file):
# - Previous version: Since last project version tag
# - Number of days: Last N days of changes
# - Specific date: Since a specific date
# - Reference branch: Compared to another branch (recommended for PRs)

# -----------------------------------------------------------------------------
# Quality Gate
# -----------------------------------------------------------------------------
# The Quality Gate is configured in the SonarCloud UI, not this file.
# However, you can reference it here for documentation purposes.
#
# Default "Sonar Way" gate conditions for NEW code:
# - Security Rating: A (no new vulnerabilities)
# - Reliability Rating: A (no new bugs)
# - Maintainability Rating: A
# - Coverage: >= 80%
# - Duplicated Lines: <= 3%
# - Security Hotspots Reviewed: 100%
#
# See: docs/03_quality_gates.md for configuration instructions.

# -----------------------------------------------------------------------------
# Scanner Performance Tuning
# -----------------------------------------------------------------------------

# sonar.scm.provider: Force a specific SCM provider. Usually auto-detected.
# Helps when running in environments without full git history.
# sonar.scm.provider=git

# sonar.scm.revision: The git commit SHA being analyzed.
# Set automatically by sonarcloud-github-action. Only set manually if needed.
# sonar.scm.revision=abc123def456

# sonar.working.directory: Where the scanner stores working files.
# Useful to point to a directory that's in .gitignore.
# Default: .scannerwork
# sonar.working.directory=.scannerwork

# -----------------------------------------------------------------------------
# Issue and Noise Reduction
# -----------------------------------------------------------------------------

# sonar.issue.ignore.multicriteria: Define issue suppression rules.
# Format: sonar.issue.ignore.multicriteria.e1.ruleKey=<pattern>
#         sonar.issue.ignore.multicriteria.e1.resourceKey=<file-pattern>
#
# Example: Suppress S2077 (SQL injection) in test fixtures only
# sonar.issue.ignore.multicriteria.e1.ruleKey=python:S2077
# sonar.issue.ignore.multicriteria.e1.resourceKey=**/test_fixtures/**
#
# WARNING: Use sparingly. Suppressing rules in production code masks real risk.
# Better approach: Fix the issue or use //NOSONAR inline with justification comment.

# -----------------------------------------------------------------------------
# External Report Import (Advanced)
# -----------------------------------------------------------------------------
# SonarCloud can import findings from other SAST/DAST tools and display them
# alongside its own findings. This provides a unified view.

# sonar.python.bandit.reportPaths: Import Bandit security scan results.
# Generate with: bandit -r src/ -f json -o bandit-report.json
# sonar.python.bandit.reportPaths=bandit-report.json

# sonar.javascript.eslint.reportPaths: Import ESLint results.
# Generate with: eslint src/ -f json -o eslint-report.json
# sonar.javascript.eslint.reportPaths=eslint-report.json

# sonar.sarifReportPaths: Import any SARIF-format report (generic).
# SARIF is a standard format supported by many security tools.
# sonar.sarifReportPaths=results.sarif
